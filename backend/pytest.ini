[pytest]
# 2 xdist workers, loadscope: pins each test class/module to one worker since tests
# share one backend and assume sequential state within a class. Run serial with `-n 0`
# (not `-p no:xdist`, which errors because addopts still passes -n/--dist).
required_plugins = pytest-xdist
addopts = -n 2 --dist loadscope
